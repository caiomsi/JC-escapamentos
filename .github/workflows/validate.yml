name: Validar site

# Verifica links quebrados e caminhos de imagens/assets a cada push.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checar links e caminhos locais
        uses: lycheeverse/lychee-action@v2
        with:
          # Verifica âncoras/assets internos; ignora o domínio ainda não publicado,
          # o WhatsApp e os mapas/links externos que não precisam ser validados.
          args: >-
            --no-progress
            --include-fragments
            --exclude-path images
            --exclude "caiomsi\.github\.io"
            --exclude "wa\.me|google\.com|caiomsi\.com|placehold\.co"
            index.html
          fail: true
